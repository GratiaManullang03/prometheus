agent:
  name: "prometheus"
  version: "0.1.0"
  loop_interval_seconds: 3600   # 1 jam — fallback OpenRouter kini multi-model, tidak tergantung Google RPD
  max_experiments_per_cycle: 3
  log_level: "INFO"

llm:
  provider: "google"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  model: "gemini-2.5-flash"
  max_tokens: 8192
  temperature: 0.3
  cache_ttl_seconds: 3600
  model_cooldown_seconds: 60    # Google free tier recover lebih cepat dari OpenRouter
  api_key: "${GOOGLE_AI_STUDIO_API_KEY}"
  # Fallback otomatis ke OpenRouter jika Google AI Studio kena 429 (RPD habis)
  # Models dirotasi per attempt — jika satu kena rate limit, langsung skip ke berikutnya
  fallback:
    base_url: "https://openrouter.ai/api/v1"
    api_key: "${OPENROUTER_API_KEY}"
    models:
      - "nousresearch/hermes-3-llama-3.1-405b:free"      # attempt 3 — reasoning terkuat
      - "meta-llama/llama-3.3-70b-instruct:free"          # attempt 4 — 70B general
      - "qwen/qwen3-coder:free"                            # attempt 5 — spesialis coding
      - "mistralai/mistral-small-3.1-24b-instruct:free"   # attempt 6 — fast fallback

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  approval_timeout_seconds: 86400  # 24 hours

docker:
  base_image: "python:3.12-slim"
  network: "none"
  memory_limit: "512m"
  cpu_limit: "1.0"
  timeout_seconds: 300
  workspace_mount: "/workspace"

git:
  workspace_path: "."
  versions_path: "./workspace/versions"
  default_branch: "main"
  experimental_branch_prefix: "experiment"

memory:
  db_path: "./memory/knowledge_base.json"
  max_entries_per_category: 1000
  prune_threshold: 900

logging:
  path: "./logs"
  max_file_size_mb: 100
  backup_count: 10

immutable_rules:
  require_approval_for:
    - "modify_core_architecture"
    - "deploy_new_version"
    - "install_dependencies"
    - "execute_external_script"
    - "spend_money"
    - "delete_versions"
  never_allowed:
    - "delete_memory_history"
    - "modify_immutable_rules"
    - "skip_approval"
